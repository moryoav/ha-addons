name: WhatsappV2
version: "1.4.24"
slug: whatsapp_addon
description: WhatsApp Web bridge for Home Assistant actions and events
url: "https://github.com/moryoav/ha-addons/tree/main/whatsapp_addon"
homeassistant_api: true
hassio_api: true
apparmor: true
stage: stable
watchdog: "http://[HOST]:[PORT:3000]/health"
discovery:
  - whatsapp
services:
  - whatsapp:provide
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
map:
  - type: homeassistant_config
    read_only: false
    path: /config
options:
  clients:
    - default
schema:
  clients:
    - str
