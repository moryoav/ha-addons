---
name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  pytest:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: python -m pip install -r requirements_test.txt

      - name: Run tests
        run: pytest --cov=custom_components.whatsapp --cov-report=term-missing --cov-fail-under=95
